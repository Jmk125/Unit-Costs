<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMR Unit Cost Manager</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --surface3: #2a2f45;
    --border: #333752;
    --accent: #3b6fd4;
    --accent-hover: #4d7fe0;
    --accent-dim: #1e3a7a;
    --green: #2ecc71;
    --green-dim: #1a4a30;
    --amber: #f39c12;
    --amber-dim: #4a3000;
    --red: #e74c3c;
    --red-dim: #4a1010;
    --text: #e8eaf2;
    --text-muted: #7a82a0;
    --text-dim: #4a5070;
    --input-bg: #141720;
    --row-hover: #1e2235;
    --font: 'Segoe UI', system-ui, sans-serif;
    --mono: 'Consolas', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; }

  /* ── NAV ── */
  #nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; height: 48px; gap: 4px; flex-shrink: 0; }
  #nav .brand { font-weight: 700; font-size: 15px; color: var(--text); margin-right: 20px; letter-spacing: 0.5px; }
  #nav .brand span { color: var(--accent); }
  .nav-btn { background: none; border: none; color: var(--text-muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: var(--font); transition: all 0.15s; }
  .nav-btn:hover { background: var(--surface3); color: var(--text); }
  .nav-btn.active { background: var(--accent-dim); color: var(--accent); }

  /* ── LAYOUT ── */
  #app { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  #main { flex: 1; overflow-y: auto; padding: 20px; }

  /* ── SIDEBAR ── */
  .sidebar-header { padding: 12px 14px 8px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .sidebar-search { padding: 0 10px 8px; }
  .sidebar-search input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 5px; font-family: var(--font); font-size: 12px; }
  .sidebar-search input:focus { outline: none; border-color: var(--accent); }
  .div-group { }
  .div-label { padding: 6px 14px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; border-top: 1px solid var(--border); margin-top: 2px; }
  .sidebar-item { display: flex; align-items: center; padding: 6px 14px 6px 20px; cursor: pointer; border-radius: 0; gap: 6px; color: var(--text-muted); font-size: 12px; transition: all 0.1s; }
  .sidebar-item:hover { background: var(--row-hover); color: var(--text); }
  .sidebar-item.active { background: var(--accent-dim); color: var(--accent); }
  .sidebar-item .item-badge { margin-left: auto; font-size: 10px; background: var(--accent-dim); color: var(--accent); padding: 1px 5px; border-radius: 10px; }
  .sidebar-item .stale-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); margin-left: auto; flex-shrink: 0; }
  #sidebar-list { flex: 1; overflow-y: auto; }
  .sidebar-add-btn { margin: 8px 10px; padding: 7px 0; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: 5px; width: calc(100% - 20px); cursor: pointer; font-size: 12px; font-family: var(--font); transition: all 0.15s; }
  .sidebar-add-btn:hover { background: var(--accent); color: #fff; }

  /* ── PANELS ── */
  .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .panel-title { font-size: 20px; font-weight: 700; }
  .panel-sub { color: var(--text-muted); font-size: 12px; }

  /* ── TABLES ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { background: var(--surface2); color: var(--text-muted); padding: 7px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table tr:hover td { background: var(--row-hover); }
  .data-table .num { font-family: var(--mono); font-size: 12px; }
  .data-table input[type=text], .data-table input[type=number], .data-table select {
    background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 12px; width: 100%; padding: 2px 4px;
  }
  .data-table input:focus, .data-table select:focus { outline: none; background: var(--input-bg); border-radius: 3px; }
  .data-table select { cursor: pointer; }
  .data-table .row-num { color: var(--text-dim); font-size: 11px; width: 24px; text-align: right; }
  .data-table .ext-cell { font-family: var(--mono); color: var(--green); font-size: 12px; text-align: right; white-space: nowrap; }
  .data-table .total-row td { background: var(--surface2); font-weight: 600; }
  .data-table .total-row .ext-cell { color: var(--text); font-size: 13px; }
  .data-table .section-header td { background: var(--surface3); color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; padding: 5px 10px; }

  /* ── FORMS ── */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 7px 10px;
    border-radius: 5px; font-family: var(--font); font-size: 12px;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }

  /* ── BUTTONS ── */
  .btn { padding: 7px 14px; border-radius: 5px; border: none; cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-success { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .btn-success:hover { background: var(--green); color: #000; }
  .btn-warn { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }
  .btn-warn:hover { background: var(--amber); color: #000; }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 9px; font-size: 11px; }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 3px 6px; border-radius: 4px; font-size: 14px; transition: all 0.1s; }
  .btn-icon:hover { color: var(--text); background: var(--surface3); }
  .delete-bar { margin-top: 16px; display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
  .delete-hint { font-size: 11px; color: var(--text-dim); margin-right: auto; }
  .del-check-cell { text-align: center; width: 28px; }
  .del-check-cell input { cursor: pointer; width: 14px; height: 14px; accent-color: var(--red); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }

  /* ── BADGES ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-draft { background: var(--surface3); color: var(--text-muted); }
  .badge-published { background: var(--green-dim); color: var(--green); }
  .badge-stale { background: var(--amber-dim); color: var(--amber); }
  .badge-div { background: var(--accent-dim); color: var(--accent); }

  /* ── STALE BANNER ── */
  .stale-banner { background: var(--amber-dim); border: 1px solid var(--amber); border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .stale-banner .stale-msg { color: var(--amber); font-size: 12px; font-weight: 600; }

  /* ── CALC SCRATCH ── */
  .calc-area { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 16px; font-family: var(--mono); font-size: 12px; }
  .calc-area textarea { background: transparent; border: none; color: var(--green); font-family: var(--mono); font-size: 12px; width: 100%; resize: vertical; min-height: 80px; }
  .calc-area textarea:focus { outline: none; }
  .calc-output { margin-top: 8px; padding: 8px; background: var(--surface3); border-radius: 4px; min-height: 28px; }
  .calc-var { display: inline-block; background: var(--accent-dim); color: var(--accent); padding: 1px 6px; border-radius: 3px; margin: 2px; font-size: 11px; cursor: pointer; }
  .calc-var:hover { background: var(--accent); color: #fff; }
  .calc-error { color: var(--red); font-size: 11px; }
  /* While editing a qty formula, signal that other material lines can be clicked in */
  body.qty-formula-active .mp-label.set { outline: 1px dashed var(--accent); outline-offset: 2px; cursor: copy; }

  /* ── SUMMARY BOX ── */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 4px; }
  .summary-row:nth-child(even) { background: var(--surface3); }
  .summary-label { color: var(--text-muted); }
  .summary-val { font-family: var(--mono); font-weight: 600; }
  .summary-total { background: var(--accent-dim) !important; }
  .summary-total .summary-label { color: var(--accent); font-weight: 700; }
  .summary-total .summary-val { color: var(--accent); font-size: 16px; }

  /* ── HISTORY TABLE ── */
  .hist-row { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; font-size: 12px; }
  .hist-date { color: var(--text-muted); width: 90px; flex-shrink: 0; }
  .hist-price { font-family: var(--mono); font-weight: 600; width: 80px; }
  .hist-by { color: var(--text-muted); width: 60px; }
  .hist-note { color: var(--text-muted); flex: 1; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ── PUBLISH MODAL HISTORY ── */
  .pub-row { padding: 8px; background: var(--surface3); border-radius: 5px; margin-bottom: 6px; }
  .pub-row .pub-top { display: flex; justify-content: space-between; font-size: 12px; }
  .pub-row .pub-cost { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--green); }
  .pub-row .pub-meta { color: var(--text-muted); font-size: 11px; margin-top: 3px; }

  /* ── MAT PICKER ── */
  .mat-picker { position: relative; }
  .mat-picker-dropdown { position: fixed; width: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; z-index: 1000; max-height: 260px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .mat-picker-search { padding: 8px; border-bottom: 1px solid var(--border); }
  .mat-picker-search input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px; }
  .mat-option { padding: 7px 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid var(--border); }
  .mat-option:hover { background: var(--row-hover); }
  .mat-option .mat-opt-name { font-weight: 500; }
  .mat-option .mat-opt-meta { color: var(--text-muted); font-size: 11px; display: flex; gap: 8px; margin-top: 2px; }

  /* ── MISC ── */
  .div-tag { font-size: 11px; color: var(--text-dim); }
  .price-stale { color: var(--amber); }
  .mat-stale-flag { cursor: pointer; font-size: 11px; line-height: 1; user-select: none; flex-shrink: 0; }
  .mat-stale-flag:hover { opacity: 0.7; }
  .add-row-bar { padding: 6px 12px 10px; }
  .add-row-btn { background: transparent; border: 1px dashed var(--border); color: var(--text-muted); font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
  .add-row-btn:hover { color: var(--text); border-color: var(--text-muted); background: var(--surface2); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .big { font-size: 36px; margin-bottom: 8px; }
  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .scrollable { overflow-y: auto; }
  .file-list-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .file-list-item a { color: var(--accent); text-decoration: none; }
  .file-list-item a:hover { text-decoration: underline; }
  .tag-div { font-size: 10px; background: var(--surface3); color: var(--text-muted); padding: 1px 5px; border-radius: 3px; }
  select option { background: var(--surface); }

  /* ── NO SPINNERS — type values directly ── */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; appearance: textfield; }

  /* ── QTY FORMULA CELL ── */
  .data-table input.has-formula { color: var(--accent); font-weight: 600; cursor: pointer; }
  .fx-btn { font-size: 10px; color: var(--text-muted); padding: 2px 5px; border-radius: 3px; line-height: 1; flex-shrink: 0; }
  .fx-btn:hover { color: var(--accent); background: var(--surface3); }
  .formula-picker { position: fixed; width: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; z-index: 1000; max-height: 300px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .formula-picker .fp-section { padding: 6px 10px; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; background: var(--surface2); }
  .fp-opt { padding: 7px 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 8px; align-items: center; }
  .fp-opt:hover { background: var(--row-hover); }
  .fp-opt .fp-val { font-family: var(--mono); color: var(--green); font-size: 11px; white-space: nowrap; }
  .fp-opt .fp-tok { font-family: var(--mono); color: var(--accent); font-size: 11px; }
  .formula-picker .fp-search { padding: 8px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 28px; z-index: 1; }
  .formula-picker .fp-search input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px; }
  .fp-empty { padding: 10px; color: var(--text-dim); font-size: 11px; }
  /* Sticky header of the ƒx picker with the "pop out to builder" button */
  .fp-head { position: sticky; top: 0; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 6px 6px 6px 10px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; }
  .fp-popout { font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 4px; padding: 3px 8px; cursor: pointer; text-transform: none; letter-spacing: 0; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
  .fp-popout:hover { background: var(--accent); color: #fff; }

  /* ── FORMULA BUILDER (pop-out calculator window) ── */
  .fb-input { width: 100%; font-family: var(--mono); font-size: 18px; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--accent); font-weight: 600; }
  .fb-input:focus { outline: none; border-color: var(--accent); }
  .fb-preview { font-family: var(--mono); font-size: 13px; color: var(--text-muted); margin: 8px 2px 14px; min-height: 18px; }
  .fb-preview b { color: var(--green); font-size: 16px; }
  .fb-preview.err b { color: var(--red); }
  .fb-cols { display: flex; gap: 16px; align-items: flex-start; }
  .fb-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; flex: 0 0 240px; }
  .fb-key { padding: 13px 0; font-family: var(--mono); font-size: 16px; background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; transition: all 0.1s; text-align: center; }
  .fb-key:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .fb-key.op { color: var(--accent); font-weight: 700; }
  .fb-key.util { background: var(--surface2); color: var(--text-muted); font-size: 13px; }
  .fb-key.util:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }
  .fb-side { flex: 1; min-width: 0; }
  .fb-side .fp-section { padding: 5px 8px; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; background: var(--surface2); border-radius: 4px; margin-bottom: 6px; }
  .fb-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .fb-chip { font-family: var(--mono); font-size: 11px; padding: 5px 9px; background: var(--surface3); border: 1px solid var(--border); border-radius: 14px; color: var(--accent); cursor: pointer; transition: all 0.1s; }
  .fb-chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .fb-chip .fb-chip-val { color: var(--green); margin-left: 4px; }
  .fb-chip:hover .fb-chip-val { color: #cfe; }
  .fb-empty { color: var(--text-dim); font-size: 11px; margin-bottom: 12px; }

  /* ── MATERIAL LINE LABEL ── */
  .mp-label { flex: 1; font-size: 12px; cursor: pointer; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mp-label.set { color: #fff; font-weight: 700; }
  .mat-picker-footer { display: flex; gap: 6px; padding: 8px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--surface); }
  .mat-picker-footer .btn { flex: 1; justify-content: center; }
  .mat-browser-list { max-height: 50vh; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; margin-top: 8px; }
  .mat-browser-list .mat-option { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .mat-browser-list .mat-opt-main { flex: 1; min-width: 0; }
  .btn-update-mat { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; padding: 3px 9px; border-radius: 4px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-update-mat:hover { color: var(--accent); border-color: var(--accent); }

  /* ── REFRESHED-PRICE HIGHLIGHT (until saved) ── */
  .data-table tr.row-refreshed td { background: var(--green-dim); }
  .data-table tr.row-refreshed:hover td { background: var(--green-dim); }
  .refreshed-tag { font-size: 9px; font-weight: 700; color: var(--green); background: rgba(46,204,113,0.15); border: 1px solid var(--green); border-radius: 3px; padding: 0 4px; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.4px; vertical-align: middle; }
</style>
</head>
<body>

<div id="nav">
  <div class="brand">CMR <span>Unit Cost</span></div>
  <button class="nav-btn active" id="nav-materials" onclick="switchTab('materials')">Materials</button>
  <button class="nav-btn" id="nav-units" onclick="switchTab('units')">Unit Costs</button>
  <button class="nav-btn" id="nav-backups" onclick="switchTab('backups')">Backup Files</button>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header" id="sidebar-title">Divisions</div>
    <div class="sidebar-search"><input type="text" id="sidebar-search" placeholder="Filter..." oninput="filterSidebar(this.value)"></div>
    <div id="sidebar-list"></div>
    <button class="sidebar-add-btn" id="sidebar-add-btn" onclick="sidebarAdd()">+ New</button>
  </div>
  <div id="main">
    <div id="view-materials"></div>
    <div id="view-units" style="display:none"></div>
    <div id="view-backups" style="display:none"></div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let state = {
  tab: 'materials',
  divisions: [],
  materials: [],
  unitCosts: [],
  backupFiles: [],
  activeDivision: null,
  activeUnitId: null,
  activeUnit: null,
  calcVars: {},
  formulaVars: {},
  refreshedOrders: new Set(),
  deleteMode: false,
  activeFormula: null,
};

// ── "Needs update" reminders on unit-cost material lines ──
// A material whose master price hasn't been updated in over a year (same
// threshold as the picker's ⚠️) gets a reminder flag on the line. The user can
// dismiss it; dismissals persist in localStorage. Keyed by material id + its
// last-updated date so a future price update surfaces a fresh reminder rather
// than being silenced forever.
const STALE_DISMISS_KEY = 'staleMatDismissals';
function loadStaleDismissals() {
  try { return new Set(JSON.parse(localStorage.getItem(STALE_DISMISS_KEY) || '[]')); }
  catch (e) { return new Set(); }
}
let staleDismissals = loadStaleDismissals();
function saveStaleDismissals() {
  localStorage.setItem(STALE_DISMISS_KEY, JSON.stringify([...staleDismissals]));
}
function staleDismissKey(mat) { return `${mat.id}|${mat.date_updated || ''}`; }

// Reminder flag HTML for a linked master material that's gone stale (>1 year).
function matLineStaleFlag(materialId) {
  if (!materialId) return '';
  const mat = state.materials.find(m => m.id === materialId);
  if (!mat || !mat.date_updated) return '';
  const dt = new Date(mat.date_updated);
  if (isNaN(dt.getTime())) return '';
  const days = Math.floor((Date.now() - dt.getTime()) / 86400000);
  if (days <= 365) return '';
  if (staleDismissals.has(staleDismissKey(mat))) return '';
  const ago = `${(days / 365).toFixed(1)}y`;
  return `<span class="mat-stale-flag" data-mat="${mat.id}" title="This material's master price hasn't been updated in ${ago} — consider updating it. Click to dismiss this reminder." onclick="dismissMatLineStale(event, ${mat.id})">⚠️</span>`;
}

function dismissMatLineStale(e, matId) {
  e.stopPropagation();
  const mat = state.materials.find(m => m.id === matId);
  if (mat) { staleDismissals.add(staleDismissKey(mat)); saveStaleDismissals(); }
  // Remove every instance of this material's flag (it may sit on multiple lines).
  document.querySelectorAll(`.mat-stale-flag[data-mat="${matId}"]`).forEach(f => f.remove());
}

const UNITS = ['SF','SY','LF','EA','CY','CW','CF','Ton','Roll','Box','CTN','LB','LS','SQ','MBF'];

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
async function init() {
  await fetch('/api/seed', { method: 'POST' });
  state.divisions = await api('/api/divisions');
  await loadMaterials();
  await loadUnitCosts();
  await loadBackupFiles();
  renderSidebar();
  renderMaterialsView();
}

async function api(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

// ════════════════════════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════════════════════════
async function switchTab(tab) {
  state.tab = tab;
  state.activeDivision = null;
  state.activeUnitId = null;
  state.activeUnit = null;
  ['materials','units','backups'].forEach(t => {
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.getElementById('sidebar-search').value = '';
  // Re-fetch on tab entry so freshness flags (e.g. the stale-price ⚠️ on units)
  // reflect master-price edits made since the page first loaded.
  if (tab === 'materials') await loadMaterials();
  else if (tab === 'units') { await loadMaterials(); await loadUnitCosts(); }
  else await loadBackupFiles();
  renderSidebar();
  if (tab === 'materials') renderMaterialsView();
  else if (tab === 'units') renderUnitsView();
  else renderBackupsView();
}

// ════════════════════════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════════════════════════
function renderSidebar(filter = '') {
  const list = document.getElementById('sidebar-list');
  const title = document.getElementById('sidebar-title');
  const addBtn = document.getElementById('sidebar-add-btn');

  if (state.tab === 'backups') {
    list.innerHTML = '';
    title.textContent = 'Files';
    addBtn.textContent = '+ Upload PDF';
    return;
  }

  if (state.tab === 'materials') {
    title.textContent = 'By Division';
    addBtn.textContent = '+ New Material';
  } else {
    title.textContent = 'Unit Costs';
    addBtn.textContent = '+ New Unit Cost';
  }

  const divItems = {};
  if (state.tab === 'materials') {
    state.materials.forEach(m => {
      if (!divItems[m.division]) divItems[m.division] = [];
      divItems[m.division].push(m);
    });
  } else {
    state.unitCosts.forEach(u => {
      if (!divItems[u.division]) divItems[u.division] = [];
      divItems[u.division].push(u);
    });
  }

  let html = '';
  // All option
  const allActive = state.activeDivision === null && state.activeUnitId === null;
  html += `<div class="sidebar-item ${allActive ? 'active' : ''}" onclick="selectSidebarAll()">All</div>`;

  state.divisions.forEach(div => {
    const items = (divItems[div.num] || []).filter(i => {
      const name = i.item_name || i.name || '';
      return !filter || name.toLowerCase().includes(filter.toLowerCase());
    });
    if (!items.length && filter) return;
    if (!divItems[div.num]) return;

    html += `<div class="div-label">Div ${div.num}</div>`;
    items.forEach(item => {
      const name = item.item_name || item.name || '';
      const isActive = state.tab === 'units' ? state.activeUnitId === item.id : false;
      const stale = state.tab === 'units' && item.stale_count > 0;
      html += `<div class="sidebar-item ${isActive ? 'active' : ''}" onclick="${state.tab === 'units' ? `selectUnit(${item.id})` : `selectDivisionMaterial(${div.num})`}">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
        <span style="margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0">
          ${stale ? `<span title="${item.stale_count} material price(s) updated — open to refresh" style="font-size:11px;line-height:1">⚠️</span>` : ''}
          ${item.status === 'published' ? '<span title="Published" style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span>' : ''}
        </span>
      </div>`;
    });
  });

  list.innerHTML = html;
}

function filterSidebar(val) { renderSidebar(val); }

function selectSidebarAll() {
  state.activeDivision = null;
  state.activeUnitId = null;
  state.activeUnit = null;
  renderSidebar();
  if (state.tab === 'materials') renderMaterialsView();
  else if (state.tab === 'units') renderUnitsView();
}

function selectDivisionMaterial(div) {
  state.activeDivision = div;
  renderSidebar();
  renderMaterialsView();
}

async function selectUnit(id) {
  state.activeUnitId = id;
  state.refreshedOrders = new Set();
  state.activeUnit = await api(`/api/unit-costs/${id}`);
  renderSidebar();
  renderUnitDetail();
}

function sidebarAdd() {
  if (state.tab === 'materials') showNewMaterialModal();
  else if (state.tab === 'units') showNewUnitModal();
  else showUploadBackupModal();
}

// ════════════════════════════════════════════════════════════
// DATA LOADERS
// ════════════════════════════════════════════════════════════
async function loadMaterials() {
  state.materials = await api('/api/materials');
}
async function loadUnitCosts() {
  const ucs = await api('/api/unit-costs');
  // fetch stale count per unit
  state.unitCosts = ucs;
}
async function loadBackupFiles() {
  state.backupFiles = await api('/api/backup-files');
}

// ════════════════════════════════════════════════════════════
// MATERIALS VIEW
// ════════════════════════════════════════════════════════════
async function renderMaterialsView() {
  const el = document.getElementById('view-materials');
  let mats = state.materials;
  if (state.activeDivision) mats = mats.filter(m => m.division == state.activeDivision);

  // Group by division
  const grouped = {};
  mats.forEach(m => {
    if (!grouped[m.division]) grouped[m.division] = [];
    grouped[m.division].push(m);
  });

  const divLabel = (num) => {
    const d = state.divisions.find(d => d.num == num);
    return d ? d.label : `Division ${num}`;
  };

  let html = `<div class="panel-header">
    <div>
      <div class="panel-title">Materials Master List</div>
      <div class="panel-sub">${mats.length} items${state.activeDivision ? ' · ' + divLabel(state.activeDivision) : ''}</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="showNewMaterialModal()">+ New Material</button>
    </div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
  <table class="data-table">
    <thead><tr>
      <th>Div</th><th style="min-width:260px">Item Name</th><th>Unit</th>
      <th style="text-align:right">Cost/Unit</th><th>Updated</th><th>By</th>
      <th style="min-width:140px">Comments</th><th>Actions</th>
    </tr></thead>
    <tbody>`;

  Object.keys(grouped).sort((a,b)=>a-b).forEach(div => {
    html += `<tr><td colspan="8" style="background:var(--surface3);padding:5px 10px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">${divLabel(div)}</td></tr>`;
    grouped[div].forEach(m => {
      html += `<tr>
        <td><span class="badge badge-div">${m.division}</span></td>
        <td><strong>${m.item_name}</strong></td>
        <td><code style="color:var(--text-muted)">${m.purchase_unit}</code></td>
        <td class="num" style="text-align:right;color:var(--green)">$${parseFloat(m.cost_per_unit).toFixed(2)}</td>
        <td style="color:var(--text-muted);white-space:nowrap">${m.date_updated}</td>
        <td style="color:var(--text-muted)">${m.updated_by || ''}</td>
        <td style="color:var(--text-muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${m.comments||''}">${m.comments||''}</td>
        <td style="white-space:nowrap">
          <button class="btn-icon" title="Edit" onclick="showEditMaterialModal(${m.id})">✏️</button>
          <button class="btn-icon" title="History" onclick="showMaterialHistory(${m.id})">📋</button>
          <button class="btn-icon" title="Delete" onclick="deleteMaterial(${m.id})">🗑️</button>
        </td>
      </tr>`;
    });
  });

  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

// ════════════════════════════════════════════════════════════
// MATERIAL MODALS
// ════════════════════════════════════════════════════════════
function showNewMaterialModal(prefill = {}) {
  const divOptions = state.divisions.map(d =>
    `<option value="${d.num}" ${prefill.division == d.num ? 'selected' : ''}>${d.label}</option>`).join('');
  const unitOptions = UNITS.map(u => `<option ${prefill.purchase_unit === u ? 'selected' : ''}>${u}</option>`).join('');
  const today = new Date().toISOString().split('T')[0];

  showModal(`<div class="modal-title">New Material</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Item Name</label><input id="m-name" value="${prefill.item_name||''}"></div>
      <div class="form-group"><label>Division</label><select id="m-div">${divOptions}</select></div>
      <div class="form-group"><label>Purchase Unit</label><select id="m-unit"><option value="">Select...</option>${unitOptions}</select></div>
      <div class="form-group"><label>Cost / Unit ($)</label><input id="m-cost" type="number" step="0.01" value="${prefill.cost_per_unit||''}"></div>
      <div class="form-group"><label>Date Updated</label><input id="m-date" type="date" value="${today}"></div>
      <div class="form-group"><label>Updated By</label><input id="m-by" value="${prefill.updated_by||'JK'}"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Comments / Notes</label><textarea id="m-comments">${prefill.comments||''}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMaterial()">Save Material</button>
    </div>`);
}

async function showEditMaterialModal(id, fromBrowser = false) {
  const mat = await api(`/api/materials/${id}`);
  const divOptions = state.divisions.map(d =>
    `<option value="${d.num}" ${mat.division == d.num ? 'selected' : ''}>${d.label}</option>`).join('');
  const unitOptions = UNITS.map(u => `<option ${mat.purchase_unit === u ? 'selected' : ''}>${u}</option>`).join('');
  const today = new Date().toISOString().split('T')[0];
  const fileOptions = state.backupFiles.map(f =>
    `<option value="${f.id}" ${mat.backup_files.find(b=>b.id===f.id)?'selected':''}>${f.original_name}</option>`).join('');

  showModal(`<div class="modal-title">Edit Material</div>
    <div style="font-size:11px;color:var(--amber);margin-bottom:12px">⚠️ Previous price ($${parseFloat(mat.cost_per_unit).toFixed(2)}) will be archived to history</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Item Name</label><input id="m-name" value="${mat.item_name}"></div>
      <div class="form-group"><label>Division</label><select id="m-div">${divOptions}</select></div>
      <div class="form-group"><label>Purchase Unit</label><select id="m-unit">${unitOptions}</select></div>
      <div class="form-group"><label>Cost / Unit ($)</label><input id="m-cost" type="number" step="0.01" value="${mat.cost_per_unit}"></div>
      <div class="form-group"><label>Date Updated</label><input id="m-date" type="date" value="${today}"></div>
      <div class="form-group"><label>Updated By</label><input id="m-by" value="${mat.updated_by}"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Comments / Notes</label><textarea id="m-comments">${mat.comments||''}</textarea></div>
    </div>
    ${state.backupFiles.length ? `<div class="form-group"><label>Link Backup File(s)</label>
      <select id="m-backup-link" multiple style="height:80px">${fileOptions}</select>
      <div style="font-size:11px;color:var(--text-muted);margin-top:3px">Ctrl+click to select multiple</div></div>` : ''}
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="${fromBrowser ? 'showMatBrowser()' : 'closeModal()'}">${fromBrowser ? '← Back' : 'Cancel'}</button>
      <button class="btn btn-primary" onclick="updateMaterial(${id}, ${fromBrowser})">Update Material</button>
    </div>`);
}

// Open the master-list edit modal for a material from the "Browse Full List"
// picker, returning to the browser afterward instead of the materials tab.
function editMaterialFromBrowser(id) {
  showEditMaterialModal(id, true);
}

async function saveMaterial() {
  const body = {
    division: +document.getElementById('m-div').value,
    item_name: document.getElementById('m-name').value.trim(),
    purchase_unit: document.getElementById('m-unit').value,
    cost_per_unit: +document.getElementById('m-cost').value,
    date_updated: document.getElementById('m-date').value,
    updated_by: document.getElementById('m-by').value.trim(),
    comments: document.getElementById('m-comments').value.trim(),
  };
  if (!body.item_name || !body.cost_per_unit || !body.purchase_unit) return alert('Please fill required fields.');
  await api('/api/materials', { method: 'POST', body: JSON.stringify(body) });
  closeModal();
  await loadMaterials();
  renderMaterialsView();
  renderSidebar();
}

async function updateMaterial(id, fromBrowser = false) {
  const body = {
    division: +document.getElementById('m-div').value,
    item_name: document.getElementById('m-name').value.trim(),
    purchase_unit: document.getElementById('m-unit').value,
    cost_per_unit: +document.getElementById('m-cost').value,
    date_updated: document.getElementById('m-date').value,
    updated_by: document.getElementById('m-by').value.trim(),
    comments: document.getElementById('m-comments').value.trim(),
  };
  await api(`/api/materials/${id}`, { method: 'PUT', body: JSON.stringify(body) });

  // Update backup links
  const sel = document.getElementById('m-backup-link');
  if (sel) {
    const selected = Array.from(sel.selectedOptions).map(o => +o.value);
    for (const fid of selected) {
      await api(`/api/materials/${id}/backup-links`, { method: 'POST', body: JSON.stringify({ backup_file_id: fid }) });
    }
  }
  await loadMaterials();
  if (fromBrowser) {
    // Came from the unit-cost material picker — return to the browser with the
    // refreshed price rather than jumping to the materials tab.
    showMatBrowser();
  } else {
    closeModal();
    renderMaterialsView();
    renderSidebar();
  }
}

async function deleteMaterial(id) {
  if (!confirm('Delete this material? This cannot be undone.')) return;
  await api(`/api/materials/${id}`, { method: 'DELETE' });
  await loadMaterials();
  renderMaterialsView();
  renderSidebar();
}

async function showMaterialHistory(id) {
  const mat = await api(`/api/materials/${id}`);
  let histHtml = '';
  if (!mat.history.length) {
    histHtml = '<div style="color:var(--text-muted);font-size:12px">No price history yet.</div>';
  } else {
    mat.history.forEach(h => {
      histHtml += `<div class="hist-row">
        <div class="hist-date">${h.date_updated}</div>
        <div class="hist-price">$${parseFloat(h.cost_per_unit).toFixed(2)}</div>
        <div class="hist-by">${h.updated_by}</div>
        <div class="hist-note">${h.comments||''}</div>
      </div>`;
    });
  }

  let filesHtml = '';
  if (mat.backup_files.length) {
    filesHtml = '<div class="card-title" style="margin-top:12px">Backup Files</div>';
    mat.backup_files.forEach(f => {
      filesHtml += `<div class="file-list-item">📄 <a href="/uploads/${f.filename}" target="_blank">${f.original_name}</a>
        <span style="color:var(--text-muted);font-size:11px;margin-left:auto">${f.description||''}</span>
        <button class="btn-icon btn-sm" onclick="unlinkBackup(${id},${f.id})">✕</button>
      </div>`;
    });
  }

  showModal(`<div class="modal-title">${mat.item_name}</div>
    <div style="display:flex;gap:16px;margin-bottom:12px">
      <div><span style="color:var(--text-muted);font-size:11px">CURRENT PRICE</span><br><span style="font-size:18px;font-family:var(--mono);color:var(--green)">$${parseFloat(mat.cost_per_unit).toFixed(2)} / ${mat.purchase_unit}</span></div>
      <div><span style="color:var(--text-muted);font-size:11px">LAST UPDATED</span><br><span>${mat.date_updated} by ${mat.updated_by}</span></div>
    </div>
    <div class="card-title">Price History</div>
    ${histHtml}
    ${filesHtml}
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
}

async function unlinkBackup(matId, fileId) {
  await api(`/api/materials/${matId}/backup-links/${fileId}`, { method: 'DELETE' });
  showMaterialHistory(matId);
}

// A unit that's been published but edited since shows "needs republish".
function unitStatusInfo(u) {
  const hasPub = (u.publications && u.publications.length) || u.last_published_at;
  if (u.status === 'published') return { cls: 'badge-published', label: 'published' };
  if (hasPub) return { cls: 'badge-stale', label: 'needs republish' };
  return { cls: 'badge-draft', label: 'draft' };
}

// ════════════════════════════════════════════════════════════
// UNIT COSTS VIEW (list)
// ════════════════════════════════════════════════════════════
function renderUnitsView() {
  if (state.activeUnit) { renderUnitDetail(); return; }
  const el = document.getElementById('view-units');
  const divLabel = (num) => { const d = state.divisions.find(d => d.num == num); return d ? d.label : `Div ${num}`; };

  const grouped = {};
  state.unitCosts.forEach(u => {
    if (!grouped[u.division]) grouped[u.division] = [];
    grouped[u.division].push(u);
  });

  let html = `<div class="panel-header">
    <div><div class="panel-title">Unit Costs</div><div class="panel-sub">${state.unitCosts.length} assemblies</div></div>
    <div style="margin-left:auto"><button class="btn btn-primary" onclick="showNewUnitModal()">+ New Unit Cost</button></div>
  </div>`;

  if (!state.unitCosts.length) {
    html += `<div class="empty-state"><div class="big">📐</div><div>No unit costs yet</div><div style="margin-top:8px"><button class="btn btn-primary" onclick="showNewUnitModal()">Create First Unit Cost</button></div></div>`;
  } else {
    html += `<div class="card" style="padding:0;overflow:hidden"><table class="data-table"><thead><tr>
      <th>Div</th><th style="min-width:220px">Name</th><th>Output</th>
      <th style="text-align:right">Last $/Unit</th><th>Status</th><th>Last Published</th><th>Actions</th>
    </tr></thead><tbody>`;
    Object.keys(grouped).sort((a,b)=>a-b).forEach(div => {
      html += `<tr><td colspan="7" style="background:var(--surface3);padding:5px 10px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">${divLabel(div)}</td></tr>`;
      grouped[div].forEach(u => {
        html += `<tr style="cursor:pointer" onclick="selectUnit(${u.id})">
          <td><span class="badge badge-div">${u.division}</span></td>
          <td><strong>${u.name}</strong>${u.stale_count > 0 ? ` <span title="${u.stale_count} material price(s) updated — open and refresh" style="cursor:help">⚠️</span>` : ''}</td>
          <td><code style="color:var(--text-muted)">${u.output_unit}</code></td>
          <td class="num" style="text-align:right;color:var(--green)">${u.last_published_cost ? '$'+parseFloat(u.last_published_cost).toFixed(2) : '—'}</td>
          <td>${(() => { const s = unitStatusInfo(u); return `<span class="badge ${s.cls}">${s.label}</span>`; })()}</td>
          <td style="color:var(--text-muted);font-size:11px">${u.last_published_at ? u.last_published_at.split('T')[0] : '—'}</td>
          <td><button class="btn-icon" onclick="event.stopPropagation();deleteUnit(${u.id})">🗑️</button></td>
        </tr>`;
      });
    });
    html += `</tbody></table></div>`;
  }
  el.innerHTML = html;
}

// ════════════════════════════════════════════════════════════
// UNIT COST DETAIL
// ════════════════════════════════════════════════════════════

// Markup for a single material line. Shared by the initial render and the
// "+ Add row" action so the two never drift apart.
function matRowHtml(line, i) {
  const stalePriceClass = line.material_id && line.current_price !== null && line.price_snapshot !== line.current_price ? 'price-stale' : '';
  const refreshed = state.refreshedOrders.has(line.line_order || (i + 1));
  const matEmpty = isMatLineEmpty(line);
  return `<tr class="${refreshed ? 'row-refreshed' : ''}">
      ${state.deleteMode ? `<td class="del-check-cell">${matEmpty ? '' : `<input type="checkbox" class="del-check" data-type="mat" data-idx="${i}" onchange="onDeleteCheckChange()">`}</td>` : ''}
      <td class="row-num">${i+1}</td>
      <td class="mat-picker" id="mp-cell-${i}">

// Append a blank material / labor row to its table on demand.
function addMatRow() {
  const tbody = document.getElementById('mat-tbody');
  if (!tbody) return;
  const i = countMatRows();
  tbody.insertAdjacentHTML('beforeend', matRowHtml({ line_order: i + 1, multiplier: 1.1 }, i));
  recalcAllMatLines();
  document.getElementById(`ml-unit-${i}`)?.scrollIntoView({ block: 'nearest' });
}

function addLabRow() {
  const tbody = document.getElementById('lab-tbody');
  if (!tbody) return;
  const i = countLabRows();
  tbody.insertAdjacentHTML('beforeend', labRowHtml({ line_order: i + 1 }, i));
  document.getElementById(`ll-type-${i}`)?.focus();
}

function countLabRows() {
  let n = 0;
  while (document.getElementById(`ll-crew-${n}`)) n++;

}

function isMatLineEmpty(line) {
  if (!line) return true;
  const hasName = !!((line.description || line.master_name || '').trim());
  const hasPrice = line.price_per_unit !== null && line.price_per_unit !== undefined && line.price_per_unit !== '' && parseFloat(line.price_per_unit) !== 0;
  const hasQty = !!((line.quantity_formula || '').toString().trim()) || (line.quantity !== null && line.quantity !== undefined && parseFloat(line.quantity) !== 0);
  return !(hasName || hasPrice || hasQty);
}

function isLabLineEmpty(line) {
  if (!line) return true;
  const hasType = !!((line.labor_type || '').trim());
  const hasNums = ['crew_size','hours','labor_rate'].some(k => line[k] !== null && line[k] !== undefined && line[k] !== '' && parseFloat(line[k]) !== 0);
  return !(hasType || hasNums);
}

// Read the current on-screen line data back into state.activeUnit so a
// re-render (entering/leaving delete mode) keeps any unsaved edits.
function captureUnitFromDOM() {
  const u = state.activeUnit;
  if (!u) return;

  const matLines = [];
  for (let i = 0; document.getElementById(`ml-price-${i}`); i++) {
    const rawF = getLineRawFormula(i);
    matLines.push({
      line_order: matLines.length + 1,
      material_id: document.getElementById(`ml-matid-${i}`)?.textContent || null,
      description: document.getElementById(`mp-label-${i}`)?.innerText?.replace(/✕/g,'')?.trim() || null,
      purchase_unit: document.getElementById(`ml-unit-${i}`)?.value || null,
      price_per_unit: parseFloat(document.getElementById(`ml-price-${i}`)?.value) || 0,
      price_snapshot: parseFloat(document.getElementById(`ml-snap-${i}`)?.textContent) || null,
      multiplier: parseFloat(document.getElementById(`ml-mltp-${i}`)?.value) || 1,
      quantity_formula: rawF || null,
      quantity: evalQtyRaw(rawF),
    });
  }
  // Normalize the "Click to select..." placeholder back to empty
  matLines.forEach(l => { if (l.description && l.description.toLowerCase().startsWith('click to select')) l.description = null; });

  const labLines = [];
  for (let i = 0; document.getElementById(`ll-crew-${i}`); i++) {
    const crew = parseFloat(document.getElementById(`ll-crew-${i}`)?.value) || 0;
    const hrs = parseFloat(document.getElementById(`ll-hrs-${i}`)?.value) || 0;
    labLines.push({
      line_order: labLines.length + 1,
      labor_type: document.getElementById(`ll-type-${i}`)?.value || null,
      crew_size: crew,
      hours: hrs,
      hours_total: crew * hrs,
      labor_rate: parseFloat(document.getElementById(`ll-rate-${i}`)?.value) || 0,
    });
  }

  u.material_lines = matLines;
  u.labor_lines = labLines;
  u.calc_scratch = document.getElementById('calc-scratch')?.value ?? u.calc_scratch;
  u.misc_bond_pct = parseFloat(document.getElementById('sum-bond-pct')?.value) || 0;
  u.escalation_pct = parseFloat(document.getElementById('sum-esc-pct')?.value) || 0;
  u.markup_pct = parseFloat(document.getElementById('sum-mkp-pct')?.value) || 0;
  u.output_quantity = document.getElementById('sum-outqty')?.value?.trim() || null;
}

// The single button at the bottom: enters delete mode, or confirms a deletion.
function onDeleteActionClick() {
  if (!state.deleteMode) {
    captureUnitFromDOM();
    state.deleteMode = true;
    renderUnitDetail();
    return;
  }
  const checked = document.querySelectorAll('.del-check:checked');
  if (checked.length === 0) {
    // Nothing selected — clicking acts as a toggle-off
    cancelDeleteMode();
    return;
  }
  performDelete();
}

function cancelDeleteMode() {
  captureUnitFromDOM();
  state.deleteMode = false;
  renderUnitDetail();
}

// Update the bottom button label/style as checkboxes change.
function onDeleteCheckChange() {
  const btn = document.getElementById('delete-action-btn');
  if (!btn) return;
  const n = document.querySelectorAll('.del-check:checked').length;
  if (n > 0) {
    btn.textContent = `✓ Confirm Delete (${n})`;
    btn.classList.remove('btn-secondary');
    btn.classList.add('btn-danger');
  } else {
    btn.textContent = '🗑 Delete Item';
    btn.classList.remove('btn-danger');
    btn.classList.add('btn-secondary');
  }
}

// Remove the checked rows, shifting everything below upward.
function performDelete() {
  captureUnitFromDOM();
  const u = state.activeUnit;

  const matDel = new Set();
  const labDel = new Set();
  document.querySelectorAll('.del-check:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.idx, 10);
    if (cb.dataset.type === 'mat') matDel.add(idx); else labDel.add(idx);
  });

  u.material_lines = (u.material_lines || [])
    .filter((_, i) => !matDel.has(i))
    .map((l, i) => ({ ...l, line_order: i + 1 }));
  u.labor_lines = (u.labor_lines || [])
    .filter((_, i) => !labDel.has(i))
    .map((l, i) => ({ ...l, line_order: i + 1 }));

  // Line references in formulas (line1, line2, ...) shift when rows are
  // removed — clearing the highlight set avoids stale "updated" tags.
  state.refreshedOrders = new Set();
  state.deleteMode = false;
  renderUnitDetail();
}

let activePickerRow = null;
function openMatPicker(rowIdx) {
  // Close any open picker
  document.querySelectorAll('.mat-picker-dropdown').forEach(d => d.remove());
  activePickerRow = rowIdx;

  const cell = document.getElementById(`mp-cell-${rowIdx}`);
  const dropdown = document.createElement('div');
  dropdown.className = 'mat-picker-dropdown';
  dropdown.id = 'mat-picker-dropdown';
  dropdown.innerHTML = `
    <div class="mat-picker-search"><input id="mat-search" placeholder="Search materials..." autofocus oninput="filterMatOptions(this.value)"></div>
    <div id="mat-options"></div>
    <div class="mat-picker-footer">
      <button class="btn btn-secondary btn-sm" onmousedown="event.preventDefault()" onclick="showMatBrowser()">Browse Full List</button>
      <button class="btn btn-secondary btn-sm" onmousedown="event.preventDefault()" onclick="showOneOffModal()">+ One-Time Item</button>
    </div>`;
  cell.appendChild(dropdown);
  renderMatOptions('');
  positionFixedDropdown(cell, dropdown);
  setTimeout(() => document.getElementById('mat-search').focus(), 50);
  document.addEventListener('click', closeMatPicker, { once: true, capture: true });

  // Keep the fixed-position dropdown anchored to its row while scrolling/resizing.
  // Self-removes once the dropdown is gone.
  const reposition = () => {
    const dd = document.getElementById('mat-picker-dropdown');
    const c = document.getElementById(`mp-cell-${rowIdx}`);
    if (!dd || !c) {
      window.removeEventListener('scroll', reposition, true);
      window.removeEventListener('resize', reposition);
      return;
    }
    positionFixedDropdown(c, dd);
  };
  window.addEventListener('scroll', reposition, true);
  window.addEventListener('resize', reposition);
}

// The dropdown is position:fixed so it isn't clipped by the table's overflow.
// Anchor a fixed-position dropdown to a cell and flip it above when there
// isn't room below; keep it within the viewport horizontally.
function positionFixedDropdown(cell, dropdown) {
  const rect = cell.getBoundingClientRect();
  const margin = 6;
  const ddHeight = dropdown.offsetHeight || 260;
  const ddWidth = dropdown.offsetWidth || 340;
  const spaceBelow = window.innerHeight - rect.bottom;
  // Open upward if there's not enough room below but more room above.
  if (spaceBelow < ddHeight + margin && rect.top > spaceBelow) {
    dropdown.style.top = Math.max(margin, rect.top - ddHeight) + 'px';
  } else {
    dropdown.style.top = rect.bottom + 'px';
  }
  // Keep the dropdown within the viewport horizontally.
  let left = rect.left;
  if (left + ddWidth > window.innerWidth - margin) {
    left = Math.max(margin, window.innerWidth - ddWidth - margin);
  }
  dropdown.style.left = left + 'px';
}

function filterMatOptions(val) {
  renderMatOptions(val);

function renderMatOptions(filter) {
  const filtered = state.materials.filter(m =>
    !filter || m.item_name.toLowerCase().includes(filter.toLowerCase()) ||
    String(m.division).includes(filter)
  ).slice(0, 50);
  const divLabel = (num) => { const d = state.divisions.find(d => d.num == num); return d ? d.label.split(' - ')[1] : num; };
  const el = document.getElementById('mat-options');
  if (!el) return;
  el.innerHTML = filtered.map(m => `
    <div class="mat-option" onmousedown="selectMatForLine(${m.id})">
      <div class="mat-opt-name">${m.item_name}</div>
      <div class="mat-opt-meta"><span>${divLabel(m.division)}</span><span>${m.purchase_unit}</span><span style="color:var(--green)">$${parseFloat(m.cost_per_unit).toFixed(2)}</span>${matUpdatedMeta(m)}</div>
    </div>`).join('');
}

// A small "last updated" badge for material pickers, colored by age so a
// stale price (>6mo amber, >1yr red) jumps out while building a unit cost.
function matUpdatedMeta(m) {
  const d = m.date_updated;
  if (!d) return `<span style="color:var(--text-dim);margin-left:auto">no date</span>`;
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return `<span style="color:var(--text-muted);margin-left:auto">upd ${d}</span>`;
  const days = Math.floor((Date.now() - dt.getTime()) / 86400000);
  let color = 'var(--text-muted)', flag = '';
  if (days > 365) { color = 'var(--red)'; flag = ' ⚠️'; }
  else if (days > 180) { color = 'var(--amber)'; }
  const ago = days < 1 ? 'today'
    : days < 31 ? `${days}d ago`
    : days < 365 ? `${Math.round(days / 30)}mo ago`
    : `${(days / 365).toFixed(1)}y ago`;
  return `<span title="Price last updated ${d} (${ago})" style="color:${color};margin-left:auto;white-space:nowrap">upd ${d}${flag}</span>`;
}

function closeMatPicker(e) {
  const dd = document.getElementById('mat-picker-dropdown');
  if (dd && !dd.contains(e.target)) dd.remove();
}

// Apply a chosen material (master or one-off) to a line.
function applyLineMaterial(i, { name, unit, price, materialId = null, snapshot = null }) {
  const label = document.getElementById(`mp-label-${i}`);
  if (!label) return;
  label.textContent = name;
  label.classList.add('set');
  // Refresh the "needs update" reminder for the newly chosen material.
  label.parentElement.querySelectorAll('.mat-stale-flag').forEach(f => f.remove());
  const flagHtml = matLineStaleFlag(materialId);
  if (flagHtml) label.insertAdjacentHTML('afterend', flagHtml);
  document.getElementById(`ml-unit-${i}`).value = unit || '';
  document.getElementById(`ml-price-${i}`).value = (price === null || price === undefined || price === '') ? '' : price;
  document.getElementById(`ml-matid-${i}`).textContent = materialId || '';
  document.getElementById(`ml-snap-${i}`).textContent = (snapshot === null || snapshot === undefined) ? '' : snapshot;
  document.getElementById(`ml-price-${i}`).classList.remove('price-stale');
  // Ensure a single clear button exists
  const wrap = label.parentElement;
  if (!wrap.querySelector('.mat-clear-btn')) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'btn-icon mat-clear-btn';
    clearBtn.style.fontSize = '10px';
    clearBtn.textContent = '✕';
    clearBtn.onclick = () => clearMatLine(i);
    wrap.appendChild(clearBtn);
  }
  recalcAllMatLines();
}

function selectMatForLine(matId) {
  const mat = state.materials.find(m => m.id === matId);
  if (!mat || activePickerRow === null) return;
  applyLineMaterial(activePickerRow, {
    name: mat.item_name, unit: mat.purchase_unit,
    price: mat.cost_per_unit, materialId: mat.id, snapshot: mat.cost_per_unit
  });
  const dd = document.getElementById('mat-picker-dropdown');
  if (dd) dd.remove();
}

function clearMatLine(i) {
  const label = document.getElementById(`mp-label-${i}`);
  label.textContent = 'Click to select...';
  label.classList.remove('set');
  const btn = label.parentElement.querySelector('.mat-clear-btn');
  if (btn) btn.remove();
  const flag = label.parentElement.querySelector('.mat-stale-flag');
  if (flag) flag.remove();
  document.getElementById(`ml-unit-${i}`).value = '';
  document.getElementById(`ml-price-${i}`).value = '';
  document.getElementById(`ml-matid-${i}`).textContent = '';
  document.getElementById(`ml-snap-${i}`).textContent = '';
  recalcAllMatLines();
}

// ── Prompt to push an edited line price back to the master list ──
function maybePromptMasterUpdate(i) {
  const matIdText = document.getElementById(`ml-matid-${i}`)?.textContent?.trim();
  if (!matIdText) return;                       // one-off / unlinked line — nothing to update
  const matId = parseInt(matIdText, 10);
  const mat = state.materials.find(m => m.id === matId);
  if (!mat) return;
  const newPrice = parseFloat(document.getElementById(`ml-price-${i}`)?.value);

  if (Math.round(newPrice * 100) === Math.round(parseFloat(mat.cost_per_unit) * 100)) return;
  showMasterUpdateModal(i, matId, newPrice);
}

function showMasterUpdateModal(i, matId, newPrice) {

async function confirmMasterUpdate(i, matId, newPrice) {
  const mat = state.materials.find(m => m.id === matId);
  if (!mat) return closeModal();
  const body = {
    division: mat.division,
    item_name: mat.item_name,
    purchase_unit: mat.purchase_unit,
    cost_per_unit: newPrice,
    date_updated: document.getElementById('mu-date').value,
    updated_by: document.getElementById('mu-by').value.trim() || 'JK',

  };

  document.getElementById(`ml-price-${i}`).classList.remove('price-stale');
