// ════════════════════════════════════════════════════════════
// FORMULA FUNCTIONS  (available in the calc pad and qty formulas)
// ════════════════════════════════════════════════════════════
// Each helper is exposed by name (and an UPPERCASE alias) inside every
// formula evaluation. Rounding helpers take an optional decimal-places arg.
const FORMULA_FNS = {};
(function () {
  const base = {
    round:     (x, d = 0) => { const f = Math.pow(10, d || 0); return Math.round((Number(x) + Number.EPSILON) * f) / f; },
    roundup:   (x, d = 0) => { const f = Math.pow(10, d || 0); return Math.ceil(Number(x) * f - 1e-9) / f; },
    rounddown: (x, d = 0) => { const f = Math.pow(10, d || 0); return Math.floor(Number(x) * f + 1e-9) / f; },
    mround:    (x, m) => (m ? Math.round(Number(x) / m) * m : Number(x)),   // nearest multiple of m
    ceil:  (x) => Math.ceil(Number(x)),
    floor: (x) => Math.floor(Number(x)),
    abs:   (x) => Math.abs(Number(x)),
    sqrt:  (x) => Math.sqrt(Number(x)),
    pow:   (x, p) => Math.pow(Number(x), Number(p)),
    min:   (...a) => Math.min(...a.map(Number)),
    max:   (...a) => Math.max(...a.map(Number)),
  };
  Object.keys(base).forEach(k => { FORMULA_FNS[k] = base[k]; FORMULA_FNS[k.toUpperCase()] = base[k]; });
})();
const FORMULA_FN_NAMES = Object.keys(FORMULA_FNS);

// True if a token is one of our formula functions (so it is NOT treated as a
// variable to substitute).
function isFormulaFn(name) { return FORMULA_FNS.hasOwnProperty(name); }

// Evaluate an expression whose variable names have already been substituted
// for their numeric values. The math helpers are injected as locals by name.
function evalExpression(replaced) {
  const fn = new Function(...FORMULA_FN_NAMES, '"use strict"; return (' + replaced + ');');
  return fn(...FORMULA_FN_NAMES.map(n => FORMULA_FNS[n]));
}

// ════════════════════════════════════════════════════════════
// CALC SCRATCH PAD
// ════════════════════════════════════════════════════════════
function evalCalcScratch() {
  const text = document.getElementById('calc-scratch')?.value || '';
  const output = document.getElementById('calc-output');
  if (!output) return;
  state.calcVars = {};
  const lines = text.split('\n');
  let html = '';
  let error = null;
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('//')) continue;
    const match = trimmed.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/);
    if (match) {
      const varName = match[1];
      const expr = match[2].replace(/[a-zA-Z_][a-zA-Z0-9_]*/g, v => {
        if (isFormulaFn(v)) return v;                      // keep round(), ceil(), etc.
        if (state.calcVars.hasOwnProperty(v)) return state.calcVars[v];
        return v;
      });
      try {
        const val = evalExpression(expr);
        state.calcVars[varName] = val;
        html += `<span class="calc-var" title="Click to insert into the formula you're editing" onmousedown="event.preventDefault();insertFormulaRef('${varName}')">${varName} = ${typeof val === 'number' ? val.toLocaleString(undefined, {maximumFractionDigits:4}) : val}</span>`;
      } catch(e) {
        error = `Error in: ${trimmed}`;
      }
    }
  }
  output.innerHTML = html || '<span style="color:var(--text-dim);font-size:11px">Variables will appear here...</span>';
  if (error) output.innerHTML += `<div class="calc-error">${error}</div>`;

  // Calc vars feed material-line formulas — refresh them live
  if (document.getElementById('mat-tbody')) recalcAllMatLines();
}

// ════════════════════════════════════════════════════════════
// FORMULA ENGINE  (calc vars + other material lines as variables)
// ════════════════════════════════════════════════════════════
function countMatRows() {
  let n = 0;
  while (document.getElementById(`ml-price-${n}`)) n++;
  return n;
}

function formatQty(n) {
  if (n === null || n === undefined || isNaN(n)) return '';
  return (Math.round(n * 10000) / 10000).toString();
}

// Evaluate an expression (no leading '='), resolving any known variable names.
function evalFormula(expr) {
  const replaced = String(expr).replace(/[a-zA-Z_][a-zA-Z0-9_]*/g, v =>
    isFormulaFn(v) ? v : (state.formulaVars.hasOwnProperty(v) ? state.formulaVars[v] : v));
  try {
    const val = evalExpression(replaced);
    return (typeof val === 'number' && isFinite(val)) ? val : null;
  } catch (e) { return null; }
}

// The raw text the user authored for a line's qty (formula or plain number).
// While the field is focused it holds the editable text; otherwise the formula
// lives in data-formula (the field shows the computed number).
function getLineRawFormula(i) {
  const el = document.getElementById(`ml-qtyf-${i}`);
  if (!el) return '';
  if (document.activeElement === el) return el.value.trim();
  return (el.dataset.formula && el.dataset.formula.length) ? el.dataset.formula.trim() : el.value.trim();
}

function evalQtyRaw(raw) {
  raw = (raw || '').trim();
  if (!raw) return 0;
  if (raw.startsWith('=')) { const v = evalFormula(raw.slice(1)); return v === null ? 0 : v; }
  return parseFloat(raw) || 0;
}

// Build the variable table: calc-pad vars + each line's quantity as line1..lineN.
// Iterate a few passes so lines that reference other lines resolve.
function rebuildFormulaVars() {
  state.formulaVars = Object.assign({}, state.calcVars);
  const n = countMatRows();
  for (let pass = 0; pass < 3; pass++) {
    for (let i = 0; i < n; i++) {
      state.formulaVars['line' + (i + 1)] = evalQtyRaw(getLineRawFormula(i));
    }
  }
}

// ════════════════════════════════════════════════════════════
// CALCULATIONS
// ════════════════════════════════════════════════════════════
function updateMatLineDisplay(i) {
  const priceEl = document.getElementById(`ml-price-${i}`);
  if (!priceEl) return;
  const price = parseFloat(priceEl.value) || 0;
  const mltp = parseFloat(document.getElementById(`ml-mltp-${i}`)?.value) || 1;
  const qtyEl = document.getElementById(`ml-qtyf-${i}`);
  const raw = getLineRawFormula(i);
  const isFormula = raw.startsWith('=');
  let qty = evalQtyRaw(raw);

  // Show the formula's output in the cell (unless the user is editing it now)
  if (qtyEl && document.activeElement !== qtyEl) {
    if (isFormula) {
      const v = evalFormula(raw.slice(1));
      qtyEl.dataset.formula = raw;
      qtyEl.value = (v === null) ? 'ERR' : formatQty(v);
      qtyEl.classList.add('has-formula');
      qtyEl.title = 'Formula: ' + raw + '  —  click to edit';
    } else {
      qtyEl.dataset.formula = '';
      qtyEl.classList.remove('has-formula');
      qtyEl.title = 'Type a number, or =formula referencing calc vars and other lines';
    }
  }

  const ext = price * mltp * qty;
  const extEl = document.getElementById(`ml-ext-${i}`);
  if (extEl) extEl.textContent = ext ? '$' + ext.toFixed(2) : '';
}

function recalcAllMatLines() {
  rebuildFormulaVars();
  const n = countMatRows();
  for (let i = 0; i < n; i++) updateMatLineDisplay(i);
  recalcSummary();
}

// ── Qty field: reveal the formula on focus, recompute on blur ──
function qtyFocus(i) {
  const el = document.getElementById(`ml-qtyf-${i}`);
  if (!el) return;
  if (el.dataset.formula && el.dataset.formula.length) {
    el.value = el.dataset.formula;     // show the raw formula for editing
    el.classList.remove('has-formula');
  }
  setActiveFormula('qty', el, i);
  if (el.select) el.select();
}

function qtyBlur(i) {
  const el = document.getElementById(`ml-qtyf-${i}`);
  if (!el) return;
  el.dataset.formula = el.value.trim().startsWith('=') ? el.value.trim() : '';
  document.body.classList.remove('qty-formula-active');
  recalcAllMatLines();
}

// ════════════════════════════════════════════════════════════
// SPREADSHEET NAVIGATION + CLICK-TO-INSERT FORMULA REFERENCES
// ════════════════════════════════════════════════════════════
// Enter moves focus straight down the same column to the next row.
function cellNav(e) {
  if (e.key !== 'Enter') return;
  const m = (e.target.id || '').match(/^(.*-)(\d+)$/);   // e.g. "ll-crew-3" -> ["ll-crew-", "3"]
  if (!m) return;
  e.preventDefault();
  const next = document.getElementById(m[1] + (parseInt(m[2], 10) + 1));
  if (next) {
    next.focus();
    if (next.select) next.select();
  } else {
    e.target.blur();   // last row — commit the value
  }
}

// Remember which formula-capable field the user is editing so clicked
// variables / line references can be inserted at the cursor.
function setActiveFormula(kind, el, row) {
  state.activeFormula = { kind, el, row };
  document.body.classList.toggle('qty-formula-active', kind === 'qty');
}

// JSON-encode a value for safe inlining inside a double-quoted HTML handler
// attribute. JSON.stringify yields double quotes, which would otherwise
// prematurely terminate the attribute (e.g. onclick="fbKey("7")").
function jsAttr(value) { return JSON.stringify(value).replace(/"/g, '&quot;'); }

function insertTextAtCursor(el, text) {
  const start = (el.selectionStart != null) ? el.selectionStart : el.value.length;
  const end = (el.selectionEnd != null) ? el.selectionEnd : el.value.length;
  el.value = el.value.slice(0, start) + text + el.value.slice(end);
  const pos = start + text.length;
  el.focus();
  if (el.setSelectionRange) el.setSelectionRange(pos, pos);
}

// Insert a token (a calc-pad variable name, or "lineN") into the formula
// the user is currently editing.
function insertFormulaRef(token) {
  const af = state.activeFormula;
  if (!af || !af.el || document.activeElement !== af.el) return;   // only when actively editing
  const el = af.el;
  if (af.kind === 'qty' && !el.value.trim().startsWith('=')) {
    // Promote a plain field to a formula so the reference makes sense
    const num = el.value.trim();
    el.value = '=' + (num && !isNaN(parseFloat(num)) ? num : '');
    el.dataset.formula = '';
    el.classList.remove('has-formula');
    if (el.setSelectionRange) el.setSelectionRange(el.value.length, el.value.length);
  }
  insertTextAtCursor(el, token);
  if (af.kind === 'scratch') evalCalcScratch();
}

// Material name labels double as "insert this line" targets while a qty
// formula is being edited. Use mousedown+preventDefault to keep the
// formula field focused; suppress the follow-up click that opens the picker.
let suppressMatClick = false;
function onMatLabelMouseDown(e, i) {
  const af = state.activeFormula;
  const lbl = document.getElementById(`mp-label-${i}`);
  const hasContent = lbl && lbl.classList.contains('set');
  if (af && af.kind === 'qty' && af.row !== i && hasContent && document.activeElement === af.el) {
    e.preventDefault();          // don't blur the formula field
    suppressMatClick = true;     // and don't open the material picker
    insertFormulaRef('line' + (i + 1));
  }
}

function matLabelClick(i) {
  if (suppressMatClick) { suppressMatClick = false; return; }
  openMatPicker(i);
}

// ════════════════════════════════════════════════════════════
// FORMULA VARIABLE PICKER  (insert calc vars / reference other lines)
// ════════════════════════════════════════════════════════════
function openFormulaPicker(i) {
  closeFormulaPicker();
  // If the cell is showing a computed number, switch to its formula text first
  const inp = document.getElementById(`ml-qtyf-${i}`);
  if (inp && inp.dataset.formula && inp.dataset.formula.length && document.activeElement !== inp) {
    inp.value = inp.dataset.formula;
    inp.classList.remove('has-formula');
  }

  const cell = document.getElementById(`qty-cell-${i}`);
  if (!cell) return;
  const dd = document.createElement('div');
  dd.className = 'formula-picker';
  dd.id = 'formula-picker';

  dd.innerHTML = `<div class="fp-head"><span>Insert into formula</span>
    <button class="fp-popout" title="Open the full formula builder with a calculator" onmousedown="event.preventDefault();openFormulaBuilder(${i})">⤢ Pop out</button></div>
    <div class="fp-search"><input id="fp-search" placeholder="Search variables, lines, functions…" oninput="renderFormulaPickerOptions(${i}, this.value)"></div>
    <div id="fp-options"></div>`;

  cell.appendChild(dd);
  renderFormulaPickerOptions(i, '');
  positionFixedDropdown(cell, dd);
  setTimeout(() => { const s = document.getElementById('fp-search'); if (s) s.focus(); }, 50);
  setTimeout(() => document.addEventListener('mousedown', formulaPickerOutside, true), 0);

  // Keep the fixed-position picker anchored to its cell while scrolling/resizing.
  const reposition = () => {
    const open = document.getElementById('formula-picker');
    const c = document.getElementById(`qty-cell-${i}`);
    if (!open || !c) {
      window.removeEventListener('scroll', reposition, true);
      window.removeEventListener('resize', reposition);
      return;
    }
    positionFixedDropdown(c, open);
  };
  window.addEventListener('scroll', reposition, true);
  window.addEventListener('resize', reposition);
}

// Render (and filter) the ƒx picker's options: calc-pad variables, other
// lines, and functions. Sections with no matches are hidden while searching.
function renderFormulaPickerOptions(i, filter) {
  const el = document.getElementById('fp-options');
  if (!el) return;
  const f = (filter || '').trim().toLowerCase();
  const match = (...parts) => !f || parts.some(p => String(p ?? '').toLowerCase().includes(f));
  let html = '';

  // ── Calc Pad Variables ──
  const allCalc = Object.keys(state.calcVars || {});
  const calcKeys = allCalc.filter(k => match(k));
  if (calcKeys.length) {
    html += `<div class="fp-section">Calc Pad Variables</div>`;
    calcKeys.forEach(k => {
      const val = state.calcVars[k];
      const shown = typeof val === 'number' ? val.toLocaleString(undefined, { maximumFractionDigits: 4 }) : val;
      html += `<div class="fp-opt" onmousedown="event.preventDefault();insertFormulaToken(${i}, ${jsAttr(k)})">
        <span class="fp-tok">${k}</span><span class="fp-val">${shown}</span></div>`;
    });
  } else if (!f && !allCalc.length) {
    html += `<div class="fp-section">Calc Pad Variables</div><div class="fp-empty">No variables yet — define them in the Calc Scratch Pad above.</div>`;
  }

  // ── Other Lines ──
  const n = countMatRows();
  let lineRows = '';
  for (let j = 0; j < n; j++) {
    if (j === i) continue;
    const lbl = (document.getElementById(`mp-label-${j}`)?.innerText || '').replace(/✕/g, '').trim();
    if (!lbl || lbl.toLowerCase().startsWith('click to select')) continue;
    const tok = 'line' + (j + 1);
    if (!match(tok, lbl)) continue;
    const unitName = document.getElementById(`ml-unit-${j}`)?.value || '';
    const q = state.formulaVars ? state.formulaVars[tok] : undefined;
    lineRows += `<div class="fp-opt" onmousedown="event.preventDefault();insertFormulaToken(${i}, '${tok}')">
      <span><span class="fp-tok">${tok}</span> · ${lbl}${unitName ? ' (' + unitName + ')' : ''}</span>
      <span class="fp-val">${q !== undefined ? formatQty(q) : ''}</span></div>`;
  }
  if (lineRows) {
    html += `<div class="fp-section">Other Lines (uses their quantity)</div>` + lineRows;
  } else if (!f) {
    html += `<div class="fp-section">Other Lines (uses their quantity)</div><div class="fp-empty">No other lines with a material/description yet.</div>`;
  }

  // ── Functions ──
  const fns = FORMULA_PICKER_FNS.filter(fn => match(fn.label, fn.desc));
  if (fns.length) {
    html += `<div class="fp-section">Functions</div>`;
    fns.forEach(fn => {
      html += `<div class="fp-opt" title="${fn.desc}" onmousedown="event.preventDefault();insertFormulaFn(${i}, ${jsAttr(fn.snippet)})">
        <span class="fp-tok">${fn.label}</span><span class="fp-val">${fn.desc}</span></div>`;
    });
  }

  el.innerHTML = html || `<div class="fp-empty">No matches.</div>`;

  // Height changed — re-anchor so it doesn't overflow the viewport.
  const dd = document.getElementById('formula-picker');
  const cell = document.getElementById(`qty-cell-${i}`);
  if (dd && cell) positionFixedDropdown(cell, dd);
}

// Catalog shown in the ƒx picker's Functions section. `snippet` uses a "|"
// to mark where the caret should land after insertion.
const FORMULA_PICKER_FNS = [
  { label: 'round',     snippet: 'round(|, 2)',     desc: 'Round to N decimals — round(x, 2)' },
  { label: 'roundup',   snippet: 'roundup(|)',      desc: 'Always round up — roundup(x, [decimals])' },
  { label: 'rounddown', snippet: 'rounddown(|)',    desc: 'Always round down — rounddown(x, [decimals])' },
  { label: 'mround',    snippet: 'mround(|, 10)',   desc: 'Round to nearest multiple — mround(x, 10)' },
  { label: 'ceil',      snippet: 'ceil(|)',         desc: 'Round up to whole number' },
  { label: 'floor',     snippet: 'floor(|)',        desc: 'Round down to whole number' },
  { label: 'min',       snippet: 'min(|)',          desc: 'Smallest of values — min(a, b, …)' },
  { label: 'max',       snippet: 'max(|)',          desc: 'Largest of values — max(a, b, …)' },
];

// Prepare a qty field for editing: reveal the raw formula text, ensure it is a
// real "=formula", give it focus and return it ready for an at-cursor insert.
// Returns null if the field can't be found.
function prepFormulaField(i) {
  const el = document.getElementById(`ml-qtyf-${i}`);
  if (!el) return null;
  const focused = document.activeElement === el;
  if (!focused) {
    // Field is showing the computed number — switch to the raw formula and put
    // the caret at the end so the insert lands somewhere sensible.
    if (el.dataset.formula && el.dataset.formula.length) el.value = el.dataset.formula;
    el.classList.remove('has-formula');
    el.focus();
    const len = el.value.length;
    if (el.setSelectionRange) el.setSelectionRange(len, len);
  }
  // Promote a plain number / empty cell to a formula so the token makes sense.
  if (!el.value.trim().startsWith('=')) {
    const t = el.value.trim();
    const num = (t && !isNaN(parseFloat(t))) ? t : '';
    el.value = '=' + num;
    const len = el.value.length;
    if (el.setSelectionRange) el.setSelectionRange(len, len);
  }
  el.dataset.formula = '';
  el.classList.remove('has-formula');
  return el;
}

// Insert a function snippet at the cursor, placing the caret where the "|"
// marker was (typically between the parentheses).
function insertFormulaFn(i, snippet) {
  closeFormulaPicker();
  const el = prepFormulaField(i);
  if (!el) return;
  const caret = snippet.indexOf('|');
  const text = snippet.replace('|', '');
  const start = (el.selectionStart != null) ? el.selectionStart : el.value.length;
  insertTextAtCursor(el, text);
  if (caret >= 0 && el.setSelectionRange) {
    const pos = start + caret;
    el.setSelectionRange(pos, pos);
  }
}

function formulaPickerOutside(e) {
  const dd = document.getElementById('formula-picker');
  if (dd && !dd.contains(e.target) && !e.target.classList.contains('fx-btn')) closeFormulaPicker();
}

function closeFormulaPicker() {
  const dd = document.getElementById('formula-picker');
  if (dd) dd.remove();
  document.removeEventListener('mousedown', formulaPickerOutside, true);
}

// Insert a calc-var name or "lineN" reference at the cursor.
function insertFormulaToken(i, token) {
  closeFormulaPicker();
  const el = prepFormulaField(i);
  if (!el) return;
  insertTextAtCursor(el, token);
}

// ════════════════════════════════════════════════════════════
// FORMULA BUILDER  (pop-out window with a calculator keypad)
// ════════════════════════════════════════════════════════════
let fbRow = null;   // material line index the builder is currently editing

// The calculator keypad. `fn` snippets use "|" to mark the caret landing spot.
const FB_KEYS = [
  { t: '7' }, { t: '8' }, { t: '9' }, { t: '/', cls: 'op' },
  { t: '4' }, { t: '5' }, { t: '6' }, { t: '*', cls: 'op' },
  { t: '1' }, { t: '2' }, { t: '3' }, { t: '-', cls: 'op' },
  { t: '0' }, { t: '.' }, { t: '(' }, { t: '+', cls: 'op' },
  { t: ')' }, { t: '⌫', cls: 'util', act: 'back' }, { t: 'C', cls: 'util', act: 'clear' }, { t: '%', cls: 'op', ins: '/100' },
];

function openFormulaBuilder(i) {
  closeFormulaPicker();
  fbRow = i;
  rebuildFormulaVars();

  const el = document.getElementById(`ml-qtyf-${i}`);
  let raw = el ? ((el.dataset.formula && el.dataset.formula.length) ? el.dataset.formula : el.value) : '';
  raw = (raw || '').trim();
  const expr = raw.startsWith('=') ? raw.slice(1).trim() : raw;

  const lineLabel = (document.getElementById(`mp-label-${i}`)?.innerText || '').replace(/✕/g, '').trim();

  let keys = '';
  FB_KEYS.forEach(k => {
    const arg = k.act ? `null, '${k.act}'` : jsAttr(k.ins || k.t);
    keys += `<button class="fb-key ${k.cls || ''}" onclick="fbKey(${arg})">${k.t}</button>`;
  });

  let fns = `<div class="fp-section">Functions</div><div class="fb-chips">`;
  FORMULA_PICKER_FNS.forEach(f => {
    fns += `<button class="fb-chip" title="${f.desc}" onclick="fbInsertFn(${jsAttr(f.snippet)})">${f.label}</button>`;
  });
  fns += `</div>`;

  let vars = `<div class="fp-section">Calc Pad Variables</div>`;
  const calcKeys = Object.keys(state.calcVars || {});
  if (calcKeys.length) {
    vars += `<div class="fb-chips">`;
    calcKeys.forEach(k => {
      const val = state.calcVars[k];
      const shown = typeof val === 'number' ? val.toLocaleString(undefined, { maximumFractionDigits: 4 }) : val;
      vars += `<button class="fb-chip" onclick="fbInsert(${jsAttr(k)})">${k}<span class="fb-chip-val">${shown}</span></button>`;
    });
    vars += `</div>`;
  } else {
    vars += `<div class="fb-empty">None yet — define them in the Calc Scratch Pad.</div>`;
  }

  let lines = `<div class="fp-section">Other Lines</div>`;
  const n = countMatRows();
  let any = false, lineChips = '';
  for (let j = 0; j < n; j++) {
    if (j === i) continue;
    const lbl = (document.getElementById(`mp-label-${j}`)?.innerText || '').replace(/✕/g, '').trim();
    if (!lbl || lbl.toLowerCase().startsWith('click to select')) continue;
    any = true;
    const q = state.formulaVars ? state.formulaVars['line' + (j + 1)] : undefined;
    lineChips += `<button class="fb-chip" title="line${j + 1}" onclick="fbInsert('line${j + 1}')">${lbl}<span class="fb-chip-val">${q !== undefined ? formatQty(q) : ''}</span></button>`;
  }
  lines += any ? `<div class="fb-chips">${lineChips}</div>` : `<div class="fb-empty">No other lines with a material yet.</div>`;

  document.getElementById('modal-box').style.width = '640px';
  showModal(`<div class="modal-title">Formula Builder${lineLabel ? ' — ' + lineLabel : ' — Line ' + (i + 1)}</div>
    <input type="text" id="fb-input" class="fb-input" value="${expr.replace(/"/g, '&quot;')}" oninput="fbPreview()" placeholder="Type a formula, e.g. line1 * 1.05">
    <div id="fb-prev" class="fb-preview"></div>
    <div class="fb-cols">
      <div class="fb-keys">${keys}</div>
      <div class="fb-side">${fns}${vars}${lines}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeFormulaBuilder()">Cancel</button>
      <button class="btn btn-primary" onclick="applyFormulaBuilder()">Apply to Line</button>
    </div>`);

  const input = document.getElementById('fb-input');
  input.focus();
  if (input.setSelectionRange) input.setSelectionRange(input.value.length, input.value.length);
  fbPreview();
}

// Insert plain text at the cursor of the builder input.
function fbInsert(text) {
  const el = document.getElementById('fb-input');
  if (!el) return;
  insertTextAtCursor(el, text);
  fbPreview();
}

// Insert a function snippet, dropping the caret on the "|" marker.
function fbInsertFn(snippet) {
  const el = document.getElementById('fb-input');
  if (!el) return;
  const caret = snippet.indexOf('|');
  const text = snippet.replace('|', '');
  const start = (el.selectionStart != null) ? el.selectionStart : el.value.length;
  insertTextAtCursor(el, text);
  if (caret >= 0 && el.setSelectionRange) el.setSelectionRange(start + caret, start + caret);
  fbPreview();
}

// Calculator key: either inserts text or runs a util action (clear / backspace).
function fbKey(text, act) {
  const el = document.getElementById('fb-input');
  if (!el) return;
  if (act === 'clear') { el.value = ''; el.focus(); fbPreview(); return; }
  if (act === 'back') {
    const s = (el.selectionStart != null) ? el.selectionStart : el.value.length;
    const e = (el.selectionEnd != null) ? el.selectionEnd : el.value.length;
    if (s !== e) { el.value = el.value.slice(0, s) + el.value.slice(e); el.setSelectionRange(s, s); }
    else if (s > 0) { el.value = el.value.slice(0, s - 1) + el.value.slice(s); el.setSelectionRange(s - 1, s - 1); }
    el.focus(); fbPreview(); return;
  }
  fbInsert(text);
}

// Live-evaluate the builder expression and show the result.
function fbPreview() {
  const el = document.getElementById('fb-input');
  const out = document.getElementById('fb-prev');
  if (!el || !out) return;
  const expr = el.value.trim().replace(/^=/, '').trim();
  if (!expr) { out.className = 'fb-preview'; out.innerHTML = '<span style="color:var(--text-dim)">Result appears here…</span>'; return; }
  const v = evalFormula(expr);
  if (v === null) { out.className = 'fb-preview err'; out.innerHTML = '= <b>error</b> — check the formula'; }
  else { out.className = 'fb-preview'; out.innerHTML = '= <b>' + formatQty(v) + '</b>'; }
}

function closeFormulaBuilder() {
  document.getElementById('modal-box').style.width = '';
  closeModal();
  fbRow = null;
}

// Write the built formula back into the line's qty field.
function applyFormulaBuilder() {
  const i = fbRow;
  const el = document.getElementById(`ml-qtyf-${i}`);
  if (!el) { closeFormulaBuilder(); return; }
  let expr = (document.getElementById('fb-input').value || '').trim().replace(/^=/, '').trim();
  let raw;
  if (!expr) raw = '';
  else if (/^[\d.]+$/.test(expr)) raw = expr;   // a bare number stays a plain qty
  else raw = '=' + expr;
  el.value = raw;
  el.dataset.formula = '';
  el.classList.remove('has-formula');
  closeFormulaBuilder();
  recalcAllMatLines();
}

function recalcLabLine(i) {
  const crew = parseFloat(document.getElementById(`ll-crew-${i}`)?.value) || 0;
  const hrs = parseFloat(document.getElementById(`ll-hrs-${i}`)?.value) || 0;
  const rate = parseFloat(document.getElementById(`ll-rate-${i}`)?.value) || 0;
  const hrsTotal = crew * hrs;
  const ext = hrsTotal * rate;
  const htEl = document.getElementById(`ll-hrstot-${i}`);
  if (htEl) htEl.textContent = hrsTotal || '';
  const extEl = document.getElementById(`ll-ext-${i}`);
  if (extEl) extEl.textContent = ext ? '$' + ext.toFixed(2) : '';
  recalcSummary();
}

function recalcAllLabLines() {
  const n = countLabRows();
  for (let i = 0; i < n; i++) recalcLabLine(i);
}

function recalcSummary() {
  let matTotal = 0;
  for (let i = 0; document.getElementById(`ml-ext-${i}`); i++) {
    matTotal += parseFloat(document.getElementById(`ml-ext-${i}`).textContent.replace('$','')) || 0;
  }
  let labTotal = 0;
  for (let i = 0; document.getElementById(`ll-ext-${i}`); i++) {
    labTotal += parseFloat(document.getElementById(`ll-ext-${i}`).textContent.replace('$','')) || 0;
  }
  const sub = matTotal + labTotal;
  const bondPct = parseFloat(document.getElementById('sum-bond-pct')?.value) || 0;
  const escPct = parseFloat(document.getElementById('sum-esc-pct')?.value) || 0;
  const mkpPct = parseFloat(document.getElementById('sum-mkp-pct')?.value) || 0;
  const withBond = sub * (1 + bondPct/100);
  const withEsc = withBond * (1 + escPct/100);
  const grandTotal = withEsc * (1 + mkpPct/100);

  // Output quantity divides the grand total into a per-output-unit cost.
  // Blank/0 => treat as a per-unit assembly (divisor of 1).
  const outRaw = document.getElementById('sum-outqty')?.value || '';
  const outQty = evalQtyRaw(outRaw);
  const divisor = (outQty && outQty !== 0) ? outQty : 1;
  const perUnit = grandTotal / divisor;

  const f = (n) => '$' + n.toFixed(2);
  if (document.getElementById('mat-total')) document.getElementById('mat-total').textContent = f(matTotal);
  if (document.getElementById('lab-total')) document.getElementById('lab-total').textContent = f(labTotal);
  if (document.getElementById('sum-mat')) document.getElementById('sum-mat').textContent = f(matTotal);
  if (document.getElementById('sum-lab')) document.getElementById('sum-lab').textContent = f(labTotal);
  if (document.getElementById('sum-sub')) document.getElementById('sum-sub').textContent = f(sub);
  if (document.getElementById('sum-total')) document.getElementById('sum-total').textContent = f(grandTotal);
  if (document.getElementById('sum-final')) document.getElementById('sum-final').textContent = f(perUnit);

  // Echo the resolved output quantity when a value is entered
  const echoRow = document.getElementById('sum-outqty-echo-row');
  const echo = document.getElementById('sum-outqty-echo');
  if (echoRow && echo) {
    if (outRaw.trim() && outQty && outQty !== 0) {
      echo.textContent = outQty.toLocaleString(undefined, { maximumFractionDigits: 4 });
      echoRow.style.display = 'flex';
    } else {
      echoRow.style.display = 'none';
    }
  }
}

function getFinalCost() {
  return parseFloat(document.getElementById('sum-final')?.textContent.replace('$','')) || 0;
}

// ════════════════════════════════════════════════════════════
// SAVE UNIT LINES
// ════════════════════════════════════════════════════════════
async function saveUnitLines() {
  const id = state.activeUnitId;
  const matLines = [];
  const nMat = countMatRows();
  for (let i = 0; i < nMat; i++) {
    if (!document.getElementById(`ml-price-${i}`)) break;
    const rawF = getLineRawFormula(i);
    const qty = evalQtyRaw(rawF);
    const ext = parseFloat(document.getElementById(`ml-ext-${i}`)?.textContent.replace('$','')) || 0;
    matLines.push({
      line_order: i + 1,
      material_id: document.getElementById(`ml-matid-${i}`)?.textContent || null,
      description: document.getElementById(`mp-label-${i}`)?.innerText?.replace(/✕/g,'')?.trim() || null,
      purchase_unit: document.getElementById(`ml-unit-${i}`)?.value || null,
      price_per_unit: parseFloat(document.getElementById(`ml-price-${i}`)?.value) || 0,
      price_snapshot: parseFloat(document.getElementById(`ml-snap-${i}`)?.textContent) || null,
      multiplier: parseFloat(document.getElementById(`ml-mltp-${i}`)?.value) || 1,
      quantity_formula: rawF || null,
      quantity: qty,
      extended: ext,
    });
  }

  const labLines = [];
  const nLab = countLabRows();
  for (let i = 0; i < nLab; i++) {
    if (!document.getElementById(`ll-crew-${i}`)) break;
    const crew = parseFloat(document.getElementById(`ll-crew-${i}`)?.value) || 0;
    const hrs = parseFloat(document.getElementById(`ll-hrs-${i}`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`ll-rate-${i}`)?.value) || 0;
    const ext = parseFloat(document.getElementById(`ll-ext-${i}`)?.textContent.replace('$','')) || 0;
    labLines.push({
      line_order: i + 1,
      labor_type: document.getElementById(`ll-type-${i}`)?.value || null,
      crew_size: crew,
      hours: hrs,
      hours_total: crew * hrs,
      labor_rate: rate,
      extended: ext,
    });
  }

  const calcScratch = document.getElementById('calc-scratch')?.value || null;
  const bondPct = parseFloat(document.getElementById('sum-bond-pct')?.value) || 0;
  const escPct = parseFloat(document.getElementById('sum-esc-pct')?.value) || 0;
  const mkpPct = parseFloat(document.getElementById('sum-mkp-pct')?.value) || 0;
  const outputQty = document.getElementById('sum-outqty')?.value?.trim() || null;

  await api(`/api/unit-costs/${id}/material-lines`, { method: 'PUT', body: JSON.stringify({ lines: matLines }) });
  await api(`/api/unit-costs/${id}/labor-lines`, { method: 'PUT', body: JSON.stringify({ lines: labLines }) });
  await api(`/api/unit-costs/${id}`, { method: 'PUT', body: JSON.stringify({
    ...state.activeUnit, calc_scratch: calcScratch,
    misc_bond_pct: bondPct, escalation_pct: escPct, markup_pct: mkpPct,
    output_quantity: outputQty
  })});

  state.activeUnit = await api(`/api/unit-costs/${id}`);
  state.refreshedOrders = new Set();   // saved — clear the "updated" highlights
  await loadUnitCosts();
  renderSidebar();
  renderUnitDetail();
  alert('Saved ✓');
}

async function refreshPrices() {
  // Capture line prices before the refresh so we can highlight what changed
  const before = {};
  (state.activeUnit.material_lines || []).forEach(l => { before[l.line_order] = l.price_per_unit; });

  const res = await api(`/api/unit-costs/${state.activeUnitId}/refresh-prices`, { method: 'POST' });
  state.activeUnit = await api(`/api/unit-costs/${state.activeUnitId}`);

  state.refreshedOrders = new Set();
  (state.activeUnit.material_lines || []).forEach(l => {
    const old = before[l.line_order];
    if (old !== undefined && Math.round((old || 0) * 100) !== Math.round((l.price_per_unit || 0) * 100)) {
      state.refreshedOrders.add(l.line_order);
    }
  });

  renderUnitDetail();
  alert(`Updated ${res.updated} price(s) — highlighted below. Save to keep, then republish.`);
}

    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="publishUnit()">📤 Publish</button>
    </div>`);
}

async function publishUnit() {
  const body = {
    project_name: document.getElementById('pub-project').value.trim(),
    estimator: document.getElementById('pub-est').value.trim(),
    cost_per_unit: parseFloat(document.getElementById('pub-cost').value),
    notes: document.getElementById('pub-notes').value.trim(),
  };
  if (!body.estimator || !body.cost_per_unit) return alert('Estimator and cost required.');
  await api(`/api/unit-costs/${state.activeUnitId}/publish`, { method: 'POST', body: JSON.stringify(body) });
  closeModal();
  state.activeUnit = await api(`/api/unit-costs/${state.activeUnitId}`);
  await loadUnitCosts();
  renderSidebar();
  renderUnitDetail();
}

async function showPublicationHistory() {
  const pubs = await api(`/api/unit-costs/${state.activeUnitId}/publications`);
  let html = `<div class="modal-title">Publication History — ${state.activeUnit.name}</div>`;
  if (!pubs.length) {
    html += `<div style="color:var(--text-muted);padding:20px 0;text-align:center">No publications yet</div>`;
  } else {
    pubs.forEach(p => {
      html += `<div class="pub-row">
        <div class="pub-top">
          <span>${p.project_name || 'No project'}</span>
          <span class="pub-cost">$${parseFloat(p.cost_per_unit).toFixed(2)}/${state.activeUnit.output_unit}</span>
        </div>
        <div class="pub-meta">${p.estimator} · ${p.published_at ? p.published_at.split('T')[0] : ''} ${p.notes ? '· ' + p.notes : ''}</div>
      </div>`;
    });
  }
  html += `<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`;
  showModal(html);
}

// ════════════════════════════════════════════════════════════
// NEW UNIT MODAL
// ════════════════════════════════════════════════════════════
function showNewUnitModal() {
  const divOptions = state.divisions.map(d => `<option value="${d.num}">${d.label}</option>`).join('');
  const unitOptions = UNITS.map(u => `<option>${u}</option>`).join('');
  showModal(`<div class="modal-title">New Unit Cost</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Unit Cost Name</label><input id="uc-name" placeholder="e.g. 8&quot; CMU Wall Cost/SF"></div>
      <div class="form-group"><label>Division</label><select id="uc-div">${divOptions}</select></div>
      <div class="form-group"><label>Output Unit</label><select id="uc-unit">${unitOptions}</select></div>
      <div class="form-group"><label>Created By</label><input id="uc-by" value="JK"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Comments</label><textarea id="uc-comments"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createUnit()">Create Unit Cost</button>
    </div>`);
}

async function createUnit() {
  const body = {
    name: document.getElementById('uc-name').value.trim(),
    division: +document.getElementById('uc-div').value,
    output_unit: document.getElementById('uc-unit').value,
    created_by: document.getElementById('uc-by').value.trim(),
    comments: document.getElementById('uc-comments').value.trim(),
  };
  if (!body.name) return alert('Name required.');
  const res = await api('/api/unit-costs', { method: 'POST', body: JSON.stringify(body) });
  closeModal();
  await loadUnitCosts();
  renderSidebar();
  await selectUnit(res.id);
}

async function deleteUnit(id) {
  if (!confirm('Delete this unit cost and all its data?')) return;
  await api(`/api/unit-costs/${id}`, { method: 'DELETE' });
  state.activeUnit = null;
  state.activeUnitId = null;
  await loadUnitCosts();
  renderSidebar();
  renderUnitsView();
}

// ════════════════════════════════════════════════════════════
// BACKUP FILES VIEW
// ════════════════════════════════════════════════════════════
function renderBackupsView() {
  const el = document.getElementById('view-backups');
  let html = `<div class="panel-header">
    <div><div class="panel-title">Backup Price Files</div><div class="panel-sub">${state.backupFiles.length} files stored</div></div>
    <div style="margin-left:auto"><button class="btn btn-primary" onclick="showUploadBackupModal()">+ Upload PDF</button></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
  <table class="data-table"><thead><tr>
    <th style="min-width:280px">File Name</th><th>Uploaded By</th><th>Date</th><th>Description</th><th>Actions</th>
  </tr></thead><tbody>`;

  if (!state.backupFiles.length) {
    html += `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">No backup files yet</td></tr>`;
  } else {
    state.backupFiles.forEach(f => {
      html += `<tr>
        <td>📄 <a href="/uploads/${f.filename}" target="_blank" style="color:var(--accent)">${f.original_name}</a></td>
        <td style="color:var(--text-muted)">${f.uploaded_by||''}</td>
        <td style="color:var(--text-muted);white-space:nowrap">${f.upload_date ? f.upload_date.split('T')[0] : ''}</td>
        <td style="color:var(--text-muted)">${f.description||''}</td>
        <td><button class="btn-icon" onclick="deleteBackupFile(${f.id})">🗑️</button></td>
      </tr>`;
    });
  }
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function showUploadBackupModal() {
  showModal(`<div class="modal-title">Upload Backup Price File</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>PDF File</label>
        <input type="file" id="bf-file" accept=".pdf" style="background:var(--input-bg);border:1px solid var(--border);border-radius:5px;padding:7px;color:var(--text)">
      </div>
      <div class="form-group"><label>Uploaded By</label><input id="bf-by" value="JK"></div>
      <div class="form-group"><label>Description</label><input id="bf-desc" placeholder="e.g. White Cap quote July 2025"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="uploadBackupFile()">Upload</button>
    </div>`);
}

async function uploadBackupFile() {
  const fileInput = document.getElementById('bf-file');
  if (!fileInput.files.length) return alert('Select a PDF file.');
  const fd = new FormData();
  fd.append('pdf', fileInput.files[0]);
  fd.append('uploaded_by', document.getElementById('bf-by').value);
  fd.append('description', document.getElementById('bf-desc').value);
  const res = await fetch('/api/backup-files', { method: 'POST', body: fd });
  const data = await res.json();
  if (data.error) return alert(data.error);
  closeModal();
  await loadBackupFiles();
  renderBackupsView();
}

async function deleteBackupFile(id) {
  if (!confirm('Delete this file? It will be unlinked from all materials.')) return;
  await api(`/api/backup-files/${id}`, { method: 'DELETE' });
  await loadBackupFiles();
  renderBackupsView();
}

// ════════════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('modal-box').style.width = '';   // reset any per-modal width override
  fbRow = null;
}
function closeModalOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ════════════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════════════
init();
</script>
</body>
</html>
